<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Covenant Love | Sermon Archive</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Lora&family=Source+Sans+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
	<link rel="stylesheet" type="text/css" href="covlove.css">
</head>
<body>



<!-- Overlay -->
<div class="overlay"></div>



<!-- Nav -->
<nav>
	<div class="logo"></div>
	<div class="container">
		<a href="/" class="current link">All Sermons</a>
		<a href="" class="filter series">Sermons by Series</a>
		<a href="" class="filter categories">Explore Categories</a>
		<a href="" class="filter year">Sermons by Year</a>
		<a href="/worship-timebox" class="link">Worship Timebox</a>
	</div>
	<div id="mobile-nav" class="mobile-nav" onclick="mobileNav()"></div>
</nav>



<!-- Desktop Filters in Nav -->
<div class="dropdown" id="series-dropdown">
	<div class="heart-motives">Heart Motives
		<span>Why do we do what we do?</span>
	</div>
	<div class="romans">Romans Series
		<span>Popular exposition preached from 2007-2010</span>
	</div>
</div>

<div class="dropdown" id="categories-dropdown">
	<button id=filterButton>Search</button>
</div>

<div class="dropdown" id="year-dropdown"></div>



<!-- Mobile Filter Screen -->
<div class="mobile-filter-screen" id="mobile-filter-screen">
	<div class="close"></div>
	<div class="container top">
		<a href="/" class="current link">All Sermons</a>
		<a href="/worship-timebox" class="link">Worship Timebox</a>
	</div>
	<div class="container middle">
		<a href="" class="filter series">Sermons by Series</a>
		<div class="accordion" id="accordion-series"></div>
		<a href="" class="filter categories">Explore Categories</a>
		<div class="accordion" id="accordion-categories"></div>
		<a href="" class="filter year">Sermons by Year</a>
		<div class="accordion" id="accordion-year"></div>
	</div>
	<div class="container bottom">
		
	</div>
</div>



<!-- Searchbar -->
<section class="search">
	<div class="search-icon"></div>
	<input type="search" name="search" id="search" placeholder="All Sermons" enterkeyhint="search">
</section>



<!-- Results -->
<section class="results" id="results">
	<div class="container"></div>
</section>



<script type="text/javascript" src="./js/api.js"></script>
<script src="https://code.jquery.com/jquery-3.6.0.min.js" integrity="sha256-/xUj+3OJU5yExlq6GSYGSHk7tPXikynS7ogEvDej/m4=" crossorigin="anonymous"></script>
<script type="text/javascript" src="./js/main.js"></script>
<script type="text/javascript" src="./js/filter.js"></script>

</body>
</html>
